<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscribirse - MusicCode</title>
    <link rel="stylesheet" href="../css/estiloSuscribirme.css">
    <link rel="stylesheet" href="../css/tema.css">
    <link rel="shortcut icon" href="../img/111.ico" type="x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script>if (localStorage.getItem('tema') === 'oscuro' || (!localStorage.getItem('tema') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.style.backgroundColor = '#121826'; }</script>
</head>

<body>
    <nav>
        <div class="contenedor-nav">
            <div class="logo">
                <img src="../img/111.ico" alt="MusicCode">
                <span>MusicCode</span>
            </div>
            <button class="toggle-tema" aria-label="Activar modo oscuro">🌙</button>
            <button class="menu-toggle" aria-label="Abrir menú">☰</button>
            <div class="nav-links">
                <a href="../index.html#inicio" class="nav-link">Inicio</a>
                <a href="../index.html#cursos" class="nav-link">Cursos</a>
                <a href="../subpáginas/contacto.html" class="nav-link">Contáctanos</a>
            </div>
        </div>
    </nav>

    <header>
        <h1 class="letrasG">Suscríbete a <em>MusicCode</em></h1>
        <p>Recibe noticias, ejercicios y consejos musicales directamente en tu correo.</p>
    </header>
    <section class="tema-musical">
        <h2>Formulario de suscripción</h2>

        <form action="exito.html" class="formulario-suscripcion">
            <div class="campo">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="campo">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="campo">
                <label for="nivel">Nivel musical:</label>
                <select id="nivel" name="nivel">
                    <option value="principiante">Principiante</option>
                    <option value="intermedio">Intermedio</option>
                    <option value="avanzado">Avanzado</option>
                </select>
            </div>

            <button type="submit" class="btn-principal">Suscribirse</button>
        </form>
    </section>

    <footer>
        <div class="footer-social">
            <a href="#" class="social-link" aria-label="Instagram">📷</a>
            <a href="#" class="social-link" aria-label="YouTube">▶️</a>
            <a href="#" class="social-link" aria-label="TikTok">🎵</a>
            <a href="#" class="social-link" aria-label="X">✖️</a>
        </div>
        <p>&copy; 2026 MusicCode. Todos los derechos reservados.</p>
    </footer>
    <script src="../js/app.js"></script>
    <script src="../js/tema.js"></script>
</body>

</html>
